<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login</title>
  <link href="./css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-success d-flex align-items-center justify-content-center vh-100">

  <div class="form-container p-5 bg-white rounded-4 shadow-lg" style="max-width: 400px; width: 100%;">

    <div class="header text-center mb-4">
      <p class="fs-4 fw-semibold text-success mb-0">Register your account to start</p>
    </div>

    <form action="./login.html">
      <div class="mb-3">
        <input type="text" placeholder="Enter Full Name" required
          class="form-control border-success p-2 focus-ring focus-ring-success">
      </div>
      <div class="mb-3">
        <input type="email" placeholder="Enter Email" required
          class="form-control border-success p-2 focus-ring focus-ring-success">
      </div>
      <div class="mb-4">
        <input type="password" placeholder="Password" required
          class="form-control border-success p-2 focus-ring focus-ring-success">
      </div>

      <button type="submit" class="btn btn-success w-100 p-2 fw-bold fs-5">Register</button>
    </form>

    <p class="text-center mt-4 mb-0 text-secondary">
      <i>Already have an account? <a href="/login.html" class="text-success fw-bold text-decoration-none">Login In
        </a></i>
    </p>

  </div>
</body>

</html>
